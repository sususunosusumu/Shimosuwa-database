<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>下諏訪・諏訪 気象アーカイブ | Shimosuwa Database</title>
  <meta name="description" content="諏訪の過去気温・雲量・昼夜の天気概況を、今日・過去・傾向の視点で見る下諏訪データベース用の気象アーカイブ。" />

  <style>
    :root{
      --bg:#f6f7f8;
      --panel:#ffffff;
      --ink:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#0f766e;
      --accent2:#2563eb;
      --soft:#ecfeff;
      --shadow:0 18px 45px rgba(15,23,42,.08);
      --radius:22px;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      background:linear-gradient(180deg,#f8fafc 0%,#eef2f7 100%);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;
      line-height:1.7;
    }

    header{
      padding:44px 20px 24px;
    }

    .wrap{
      max-width:1180px;
      margin:0 auto;
    }

    .hero{
      background:
        radial-gradient(circle at 20% 0%,#dff7f4 0%,transparent 36%),
        radial-gradient(circle at 85% 5%,#e0ebff 0%,transparent 38%),
        #fff;
      border:1px solid var(--line);
      border-radius:30px;
      padding:34px;
      box-shadow:var(--shadow);
    }

    .eyebrow{
      font-size:13px;
      letter-spacing:.13em;
      color:var(--accent);
      font-weight:800;
      text-transform:uppercase;
    }

    h1{
      font-size:clamp(28px,4vw,52px);
      line-height:1.12;
      margin:10px 0 12px;
      letter-spacing:-.04em;
    }

    .lead{
      max-width:820px;
      color:#374151;
      font-size:16px;
      margin:0;
    }

    main{
      padding:0 20px 48px;
    }

    .grid{
      display:grid;
      grid-template-columns:360px 1fr;
      gap:18px;
      align-items:start;
    }

    .panel{
      background:rgba(255,255,255,.9);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .controls{
      position:sticky;
      top:14px;
      padding:20px;
    }

    .section-title{
      font-size:14px;
      font-weight:900;
      letter-spacing:.04em;
      margin:0 0 12px;
      color:#0f172a;
    }

    .control{
      padding:14px 0;
      border-top:1px solid var(--line);
    }

    .control:first-of-type{
      border-top:0;
    }

    label{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-weight:800;
      font-size:13px;
    }

    .val{
      color:var(--accent2);
      font-variant-numeric:tabular-nums;
    }

    input[type=range]{
      width:100%;
      accent-color:var(--accent);
      margin:12px 0 2px;
    }

    select,button{
      font:inherit;
    }

    .row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    button{
      border:1px solid var(--line);
      background:#fff;
      border-radius:999px;
      padding:9px 13px;
      font-weight:800;
      cursor:pointer;
    }

    button.primary{
      background:#0f172a;
      color:#fff;
      border-color:#0f172a;
    }

    .status{
      font-size:12px;
      color:var(--muted);
      margin-top:12px;
      word-break:break-word;
    }

    .note{
      font-size:12px;
      color:#64748b;
      padding:12px 16px;
      background:#f8fafc;
      border-radius:16px;
      border:1px solid var(--line);
      margin-top:12px;
    }

    .content{
      display:grid;
      gap:18px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
    }

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      min-height:118px;
    }

    .k{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
    }

    .v{
      font-size:28px;
      font-weight:900;
      letter-spacing:-.03em;
      margin-top:6px;
    }

    .s{
      font-size:12px;
      color:#64748b;
      margin-top:6px;
    }

    .viz{
      padding:18px;
    }

    .viz h2{
      font-size:19px;
      margin:0 0 4px;
      letter-spacing:-.02em;
    }

    .viz p{
      font-size:13px;
      color:var(--muted);
      margin:0 0 12px;
    }

    canvas{
      width:100%;
      height:320px;
      border-radius:16px;
      background:linear-gradient(180deg,#fff,#fbfdff);
      border:1px solid var(--line);
    }

    .two{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:13px;
      min-width:680px;
    }

    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 12px;
      text-align:left;
      white-space:nowrap;
    }

    th{
      background:#f8fafc;
      font-size:12px;
      color:#475569;
    }

    .bar{
      height:10px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
    }

    .bar>span{
      display:block;
      height:100%;
      background:#0f766e;
      border-radius:999px;
    }

    .pill{
      display:inline-flex;
      padding:3px 8px;
      border-radius:999px;
      background:#f1f5f9;
      color:#334155;
      font-weight:800;
      font-size:12px;
    }

    @media(max-width:920px){
      .grid{
        grid-template-columns:1fr;
      }

      .controls{
        position:relative;
        top:auto;
      }

      .cards{
        grid-template-columns:repeat(2,1fr);
      }

      .two{
        grid-template-columns:1fr;
      }
    }

    @media(max-width:560px){
      .hero{
        padding:24px;
      }

      .cards{
        grid-template-columns:1fr;
      }

      canvas{
        height:260px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="wrap hero">
    <div class="eyebrow">Shimosuwa Database / Weather Archive</div>

    <h1>今日の空を、過去から見る。</h1>

    <p class="lead">
      諏訪の時間別気温と日別天気概況を読み込み、
      選んだ日付を中心に、過去の気温カーブ・昼夜の天気割合・雲量傾向をまとめて表示します。
    </p>
  </div>
</header>

<main class="wrap grid">

  <aside class="panel controls">

    <h2 class="section-title">操作パネル</h2>

    <div class="control">
      <label>
        見る日付
        <span class="val" id="dateLabel">--</span>
      </label>

      <input id="daySlider" type="range" min="1" max="366" value="1">

      <div class="row">
        <button id="todayBtn" class="primary">今日にする</button>
        <button id="prevBtn">前日</button>
        <button id="nextBtn">翌日</button>
      </div>
    </div>

    <div class="control">
      <label>
        前後日数
        <span class="val" id="windowLabel">±3日</span>
      </label>

      <input id="windowSlider" type="range" min="0" max="15" value="3">
    </div>

    <div class="control">
      <label>
        分析開始年
        <span class="val" id="startYearLabel">1950</span>
      </label>

      <input id="startYear" type="range" min="1950" max="2026" value="1950">

      <label>
        分析終了年
        <span class="val" id="endYearLabel">2026</span>
      </label>

      <input id="endYear" type="range" min="1950" max="2026" value="2026">
    </div>

    <div class="control">
      <label>
        注目する時刻
        <span class="val" id="hourLabel">現在時刻</span>
      </label>

      <input id="hourSlider" type="range" min="1" max="24" value="12">
    </div>

    <div class="status" id="status">
      CSVを読み込み中...
    </div>

    <div class="note">
      CSVは
      <b>/weather/temp/</b>
      と
      <b>/weather/tenki/</b>
      に配置してください。
    </div>

  </aside>

  <section class="content">

    <div class="cards">

      <div class="card">
        <div class="k">対象日</div>
        <div class="v" id="cardDate">--</div>
        <div class="s" id="cardRange">--</div>
      </div>

      <div class="card">
        <div class="k">過去平均気温</div>
        <div class="v" id="cardAvg">--</div>
        <div class="s">選択日の全時刻平均</div>
      </div>

      <div class="card">
        <div class="k">注目時刻の平均との差</div>
        <div class="v" id="cardNow">--</div>
        <div class="s" id="cardNowSub">--</div>
      </div>

      <div class="card">
        <div class="k">晴れ系の割合</div>
        <div class="v" id="cardSunny">--</div>
        <div class="s">前後期間・昼の天気概況</div>
      </div>

    </div>

  </section>

</main>

<script>

const TEMP_FILES = [
  "SUWA_WEATHER_1950_1954.csv",
  "SUWA_WEATHER_1955_1959.csv",
  "SUWA_WEATHER_1960_1964.csv",
  "SUWA_WEATHER_1965_1969.csv",
  "SUWA_WEATHER_1970_1974.csv",
  "SUWA_WEATHER_1975_1979.csv",
  "SUWA_WEATHER_1980_1984.csv",
  "SUWA_WEATHER_1985_1989.csv",
  "SUWA_WEATHER_1990_1994.csv",
  "SUWA_WEATHER_1995_1999.csv",
  "SUWA_WEATHER_2000_2004.csv",
  "SUWA_WEATHER_2005_2009.csv",
  "SUWA_WEATHER_2010_2014.csv",
  "SUWA_WEATHER_2015_2019.csv",
  "SUWA_WEATHER_2020_2024.csv",
  "SUWA_WEATHER_2025_2026.csv"
].map(f => "./temp/" + f);

const TENKI_FILES = [
  "SUWA_TENKI_1950_1979.csv",
  "SUWA_TENKI_1980_2009.csv",
  "SUWA_TENKI_2010_2026.csv"
].map(f => "./tenki/" + f);

let tempRows = [];
let tenkiRows = [];

const $ = id => document.getElementById(id);

async function fetchText(path){
  const r = await fetch(path);

  if(!r.ok){
    throw new Error(path + " が読めません");
  }

  const buf = await r.arrayBuffer();

  return new TextDecoder("shift_jis").decode(buf);
}

function parseTempCsv(text){

  const lines = text.split(/\r?\n/).slice(5);

  const rows = [];

  for(const line of lines){

    if(!line.trim()) continue;

    const c = line.split(",");

    if(c.length < 5) continue;

    const y = +c[0];
    const m = +c[1];
    const d = +c[2];
    const h = +c[3];
    const t = parseFloat(c[4]);

    if(
      Number.isFinite(y) &&
      Number.isFinite(m) &&
      Number.isFinite(d) &&
      Number.isFinite(h) &&
      Number.isFinite(t)
    ){
      rows.push({y,m,d,h,t});
    }
  }

  return rows;
}

function parseTenkiCsv(text){

  const lines = text.split(/\r?\n/).slice(5);

  const rows = [];

  for(const line of lines){

    if(!line.trim()) continue;

    const c = line.split(",");

    if(c.length < 10) continue;

    const y = +c[0];
    const m = +c[1];
    const d = +c[2];
    const avg = parseFloat(c[3]);
    const cloud = parseFloat(c[6]);

    const day = c[9] || "";
    const night = c[12] || "";

    if(
      Number.isFinite(y) &&
      Number.isFinite(m) &&
      Number.isFinite(d)
    ){
      rows.push({
        y,m,d,avg,cloud,day,night
      });
    }
  }

  return rows;
}

function monthDayToDoy(m,d){

  const base = new Date(2024,0,1);

  const x = new Date(2024,m-1,d);

  return Math.round((x-base)/86400000)+1;
}

function dayToMonthDay(doy){

  const d = new Date(2024,0,doy);

  return {
    m:d.getMonth()+1,
    d:d.getDate(),
    label:`${d.getMonth()+1}月${d.getDate()}日`
  };
}

function avg(arr){

  const v = arr.filter(Number.isFinite);

  if(!v.length) return null;

  return v.reduce((a,b)=>a+b,0)/v.length;
}

function fmt(v,unit="℃"){

  if(v==null) return "--";

  return v.toFixed(1)+unit;
}

function render(){

  const md = dayToMonthDay(+$("daySlider").value);

  $("dateLabel").textContent = md.label;
  $("cardDate").textContent = md.label;

  const rows = tempRows.filter(
    r => r.m === md.m && r.d === md.d
  );

  $("cardAvg").textContent =
    fmt(avg(rows.map(r=>r.t)));

  $("cardRange").textContent =
    `気温データ ${rows.length.toLocaleString()}件`;

  $("cardNow").textContent =
    rows.length ? "OK" : "--";

  $("cardSunny").textContent =
    tenkiRows.length ? "OK" : "--";
}

async function init(){

  const now = new Date();

  $("daySlider").value =
    monthDayToDoy(
      now.getMonth()+1,
      now.getDate()
    );

  try{

    const tempTexts =
      await Promise.all(
        TEMP_FILES.map(fetchText)
      );

    const tenkiTexts =
      await Promise.all(
        TENKI_FILES.map(fetchText)
      );

    tempRows =
      tempTexts.flatMap(parseTempCsv);

    tenkiRows =
      tenkiTexts.flatMap(parseTenkiCsv);

    $("status").textContent =
      `読み込み完了：気温 ${tempRows.length.toLocaleString()}件 / 天気 ${tenkiRows.length.toLocaleString()}件`;

    render();

  }catch(err){

    $("status").textContent =
      "読み込みエラー: " + err.message;

    console.error(err);
  }
}

$("daySlider").addEventListener("input",render);

$("todayBtn").addEventListener("click",()=>{

  const now = new Date();

  $("daySlider").value =
    monthDayToDoy(
      now.getMonth()+1,
      now.getDate()
    );

  render();
});

$("prevBtn").addEventListener("click",()=>{

  $("daySlider").value =
    Math.max(
      1,
      +$("daySlider").value - 1
    );

  render();
});

$("nextBtn").addEventListener("click",()=>{

  $("daySlider").value =
    Math.min(
      366,
      +$("daySlider").value + 1
    );

  render();
});

init();

</script>

</body>
</html>
