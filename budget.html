<script>
  // 金額文字列を数値化
  function toNumber(value) {
    if (value === null || value === undefined) return 0;
    return Number(String(value).replace(/,/g, "").replace(/[^0-9.-]/g, "")) || 0;
  }

  // 「合計」「小計」など円グラフに入れたくない項目を除外
  function isSummaryLabel(label) {
    if (!label) return false;
    const text = String(label).trim();
    return [
      "合計",
      "総計",
      "小計",
      "計",
      "一般会計合計",
      "一般会計歳入合計",
      "一般会計歳出合計"
    ].includes(text);
  }

  // 上位n件 + その他 にまとめる
  function buildTopItemsForDonut(data, labelKey, valueKey, topN = 7) {
    const cleaned = data
      .map(row => ({
        label: String(row[labelKey] ?? "").trim(),
        value: toNumber(row[valueKey])
      }))
      .filter(row => row.label && !isSummaryLabel(row.label) && row.value > 0)
      .sort((a, b) => b.value - a.value);

    const topItems = cleaned.slice(0, topN);
    const others = cleaned.slice(topN);
    const othersTotal = others.reduce((sum, row) => sum + row.value, 0);

    if (othersTotal > 0) {
      topItems.push({
        label: "その他",
        value: othersTotal
      });
    }

    return topItems;
  }

  // =========================
  // 一般会計歳入 上位（修正版）
  // =========================
  const revenueDonutSource = buildTopItemsForDonut(
    generalRevenueData,   // 既存の歳入データ配列
    "区分",               // ラベル列名
    "令和8年度当初予算額", // 金額列名
    7
  );

  if (window.revenueDonutChart) {
    window.revenueDonutChart.destroy();
  }

  window.revenueDonutChart = new Chart(
    document.getElementById("revenueDonutChart"),
    {
      type: "doughnut",
      data: {
        labels: revenueDonutSource.map(d => d.label),
        datasets: [
          {
            data: revenueDonutSource.map(d => d.value),
            borderWidth: 1
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: "top"
          },
          title: {
            display: true,
            text: "一般会計歳入 上位"
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                const value = context.raw || 0;
                return `${context.label}: ${value.toLocaleString()} 万円`;
              }
            }
          }
        }
      }
    }
  );

  // =========================
  // 一般会計歳出 上位（修正版）
  // =========================
  const expenditureDonutSource = buildTopItemsForDonut(
    generalExpenditureData, // 既存の歳出データ配列
    "区分",                 // ラベル列名
    "令和8年度当初予算額",   // 金額列名
    7
  );

  if (window.expenditureDonutChart) {
    window.expenditureDonutChart.destroy();
  }

  window.expenditureDonutChart = new Chart(
    document.getElementById("expenditureDonutChart"),
    {
      type: "doughnut",
      data: {
        labels: expenditureDonutSource.map(d => d.label),
        datasets: [
          {
            data: expenditureDonutSource.map(d => d.value),
            borderWidth: 1
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: "top"
          },
          title: {
            display: true,
            text: "一般会計歳出 上位"
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                const value = context.raw || 0;
                return `${context.label}: ${value.toLocaleString()} 万円`;
              }
            }
          }
        }
      }
    }
  );
</script>
